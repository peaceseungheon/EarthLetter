name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/earthletter_test
      DIRECT_URL: postgres://postgres:postgres@localhost:5432/earthletter_test
      SITE_URL: http://localhost:3000
      INGEST_SECRET: test-ingest-secret-at-least-eight
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: E2E tests
        run: pnpm test:e2e
