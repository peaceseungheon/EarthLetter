name: ingest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  run-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/ingest
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$INGEST_SECRET" ]; then
            echo "Missing SITE_URL or INGEST_SECRET secret." >&2
            exit 1
          fi
          curl --fail --silent --show-error \
            --max-time 300 \
            -X POST "$SITE_URL/api/ingest" \
            -H "Authorization: Bearer $INGEST_SECRET" \
            -H "Content-Type: application/json" \
            -o response.json
          echo "--- ingestion summary ---"
          cat response.json
